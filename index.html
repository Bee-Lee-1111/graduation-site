<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>青春不散场 | 毕业纪念</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #16213e;
      --muted: #667085;
      --paper: #fffaf2;
      --sun: #ffd166;
      --coral: #ef476f;
      --mint: #06d6a0;
      --sky: #118ab2;
      --deep: #073b4c;
      --line: rgba(22, 33, 62, 0.13);
      --shadow: 0 20px 55px rgba(7, 59, 76, 0.17);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 12%, rgba(255, 209, 102, 0.28), transparent 30%),
        radial-gradient(circle at 84% 8%, rgba(6, 214, 160, 0.18), transparent 28%),
        linear-gradient(180deg, #fffaf2 0%, #f2fbff 45%, #fff7fb 100%);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px clamp(18px, 4vw, 56px);
      color: #fff;
      background: linear-gradient(180deg, rgba(7, 59, 76, 0.72), rgba(7, 59, 76, 0));
      pointer-events: none;
    }

    .brand,
    .nav-links {
      pointer-events: auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--deep);
      background: var(--sun);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(7, 59, 76, 0.32);
      backdrop-filter: blur(14px);
    }

    .nav-links a {
      min-width: 58px;
      padding: 8px 12px;
      border-radius: 999px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-links a:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .hero {
      position: relative;
      min-height: 86vh;
      display: grid;
      align-items: start;
      overflow: hidden;
      isolation: isolate;
      background: #073b4c;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background-image: var(--hero-img);
      background-size: cover;
      background-position: center;
      transform: scale(1.03);
      animation: heroFloat 16s ease-in-out infinite alternate;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(180deg, rgba(7, 59, 76, 0.26) 0%, rgba(7, 59, 76, 0.02) 38%, rgba(255, 255, 255, 0.06) 100%),
        linear-gradient(90deg, rgba(7, 59, 76, 0.34) 0%, rgba(7, 59, 76, 0.08) 42%, rgba(7, 59, 76, 0.01) 100%);
    }

    @keyframes heroFloat {
      from { transform: scale(1.03) translate3d(0, 0, 0); }
      to { transform: scale(1.09) translate3d(-1.5%, -1%, 0); }
    }

    .hero-content {
      width: min(1120px, calc(100% - 36px));
      margin: 0 auto;
      padding: 104px 0 0;
      color: #fff;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
    }

    .kicker::before {
      content: "";
      width: 38px;
      height: 3px;
      border-radius: 999px;
      background: var(--sun);
    }

    h1 {
      width: min(560px, 100%);
      margin: 0;
      font-size: clamp(34px, 5.5vw, 72px);
      line-height: 1.04;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.28);
    }

    .hero-text {
      width: min(430px, 100%);
      margin: 16px 0 0;
      font-size: clamp(15px, 1.8vw, 18px);
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 3px 16px rgba(0, 0, 0, 0.24);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 34px;
    }

    .album-preview {
      display: none;
    }

    .album-card {
      position: relative;
      overflow: hidden;
      border: 8px solid rgba(255, 255, 255, 0.86);
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.28);
      transform: rotate(var(--tilt, 0deg));
    }

    .album-card:nth-child(1),
    .album-card:nth-child(3) {
      aspect-ratio: 3 / 4;
    }

    .album-card:nth-child(2),
    .album-card:nth-child(4) {
      aspect-ratio: 4 / 5;
      margin-bottom: 26px;
    }

    .album-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: saturate(0.94) contrast(1.03);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 12px 18px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 999px;
      font-weight: 800;
      color: #fff;
      background: rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(12px);
      cursor: pointer;
    }

    .btn.primary {
      color: var(--deep);
      border-color: var(--sun);
      background: var(--sun);
    }

    .section {
      padding: clamp(58px, 8vw, 108px) clamp(18px, 4vw, 56px);
    }

    .section-inner {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 30px;
    }

    h2 {
      margin: 0;
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .section-title p {
      max-width: 420px;
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-weight: 600;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: -42px;
      position: relative;
      z-index: 4;
    }

    .stat {
      min-height: 126px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .stat strong {
      display: block;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
      color: var(--deep);
    }

    .stat span {
      display: block;
      margin-top: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .memory-band {
      background: #ffffff;
      overflow: hidden;
      border-block: 1px solid var(--line);
    }

    .marquee-wrap {
      display: grid;
      gap: 18px;
      width: 100%;
    }

    .marquee {
      display: flex;
      gap: 18px;
      width: max-content;
      animation: slideLeft 58s linear infinite;
    }

    .marquee.reverse {
      animation-name: slideRight;
      animation-duration: 64s;
    }

    .marquee:hover {
      animation-play-state: paused;
    }

    @keyframes slideLeft {
      to { transform: translateX(-50%); }
    }

    @keyframes slideRight {
      from { transform: translateX(-50%); }
      to { transform: translateX(0); }
    }

    .strip-photo {
      width: clamp(210px, 26vw, 360px);
      aspect-ratio: 4 / 3;
      flex: 0 0 auto;
      overflow: hidden;
      border-radius: 8px;
      background: #e7f5f6;
      box-shadow: 0 18px 42px rgba(7, 59, 76, 0.16);
    }

    .strip-photo img,
    .photo img,
    .feature img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .story {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0));
    }

    .story-grid {
      display: grid;
      grid-template-columns: 1.04fr 0.96fr;
      gap: clamp(22px, 4vw, 54px);
      align-items: center;
    }

    .feature {
      position: relative;
      min-height: 520px;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: var(--shadow);
      background: #dff8f2;
    }

    .feature-label {
      position: absolute;
      left: 18px;
      bottom: 18px;
      right: 18px;
      padding: 16px 18px;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background: rgba(7, 59, 76, 0.64);
      backdrop-filter: blur(14px);
    }

    .feature-label strong {
      display: block;
      font-size: 22px;
    }

    .feature-label span {
      display: block;
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.78);
      line-height: 1.5;
    }

    .quote {
      padding: 10px 0;
    }

    .quote p {
      margin: 0;
      font-size: clamp(24px, 4vw, 46px);
      line-height: 1.34;
      font-weight: 900;
      color: var(--deep);
      text-wrap: balance;
    }

    .quote .note {
      margin-top: 22px;
      font-size: 16px;
      line-height: 1.9;
      color: var(--muted);
      font-weight: 600;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    .chip {
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      font-weight: 800;
      color: var(--deep);
    }

    .tile-line {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      color: var(--deep);
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 900;
      line-height: 1.2;
    }

    .tile-line span {
      display: grid;
      place-items: center;
      width: 42px;
      height: 52px;
      border: 1px solid rgba(7, 59, 76, 0.18);
      border-radius: 7px;
      color: var(--deep);
      background: #fff;
      box-shadow: 0 10px 22px rgba(7, 59, 76, 0.1);
    }

    .tile-line span:first-child,
    .tile-line span:nth-child(2) {
      color: #ef476f;
    }

    .gallery {
      background:
        linear-gradient(180deg, #fbfaf6 0%, #f7fbff 46%, #fff 100%);
      border-top: 1px solid var(--line);
    }

    .gallery .section-inner {
      width: min(1720px, calc(100vw - 32px));
    }

    .photo-grid {
      column-count: 5;
      column-gap: 16px;
    }

    .photo {
      position: relative;
      display: block;
      width: 100%;
      margin: 0 0 16px;
      padding: 0;
      overflow: hidden;
      border-radius: 8px;
      border: 0;
      background: #e8eef6;
      box-shadow: 0 14px 32px rgba(7, 59, 76, 0.1);
      cursor: zoom-in;
      break-inside: avoid;
      text-align: left;
    }

    .photo::after {
      content: attr(data-title);
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 32px 12px 12px;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      background: linear-gradient(0deg, rgba(7, 59, 76, 0.7), transparent);
      opacity: 0;
      transition: opacity 0.24s ease;
    }

    .photo:hover img {
      transform: scale(1.06);
    }

    .photo:hover::after {
      opacity: 1;
    }

    .photo img {
      width: 100%;
      height: auto;
      transition: transform 0.45s ease;
    }

    .people {
      background: #fff;
      border-top: 1px solid var(--line);
    }

    .people-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
    }

    .person-card {
      min-width: 0;
      padding: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 30px rgba(7, 59, 76, 0.08);
      cursor: pointer;
      text-align: left;
    }

    .person-card.active {
      outline: 3px solid var(--sun);
      outline-offset: 2px;
    }

    .person-card img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
    }

    .person-card span {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 46px;
      padding: 10px 12px;
      color: var(--deep);
      font-weight: 900;
      font-size: 14px;
    }

    .person-card small {
      color: var(--muted);
      font-weight: 800;
    }

    .load-row {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 30px;
    }

    .load-more {
      min-height: 46px;
      padding: 12px 22px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: var(--deep);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(7, 59, 76, 0.2);
    }

    .load-more:disabled {
      color: rgba(255, 255, 255, 0.76);
      background: #8aa1aa;
      cursor: default;
      box-shadow: none;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(7, 23, 33, 0.88);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: min(96vw, 1400px);
      max-height: 88vh;
      border-radius: 8px;
      object-fit: contain;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
    }

    .close {
      position: fixed;
      top: 18px;
      right: 18px;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 50%;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
    }

    footer {
      padding: 34px 18px 42px;
      color: rgba(255, 255, 255, 0.74);
      text-align: center;
      background: var(--deep);
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .nav {
        align-items: flex-start;
      }

      .nav-links {
        display: none;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 0;
      }

      .section-title,
      .story-grid {
        grid-template-columns: 1fr;
        display: grid;
      }

      .feature {
        min-height: 430px;
      }

      .people-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .photo-grid {
        column-count: 3;
        column-gap: 12px;
      }
    }

    @media (max-width: 560px) {
      .hero-content {
        padding-top: 108px;
      }

      .hero-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .stat {
        min-height: 100px;
      }

      .photo-grid {
        column-count: 2;
      }

      .photo {
        margin-bottom: 12px;
      }

      .album-preview {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .people-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

    }
  </style>
</head>

  <nav class="nav" aria-label="页面导航">
    <a class="brand" href="#top" aria-label="回到顶部">
      <span class="brand-mark">毕</span>
      <span>青春不散场</span>
    </a>
    <div class="nav-links">
      <a href="#moments">流动画卷</a>
      <a href="#people">人物</a>
      <a href="#gallery">瀑布流</a>
    </div>
  </nav>

  <header class="hero" id="top">
    <div class="hero-content" aria-label="毕业封面"></div>
  </header>

  <main>
    <section class="section people">
      <div class="section-inner">
        <div class="section-title" id="people">
          <h2>人物合集</h2>
          <p class="tile-line" aria-label="中发白东南西北风">
            <span>中</span>
            <span>发</span>
            <span>白</span>
            <span>东</span>
            <span>南</span>
            <span>西</span>
            <span>北</span>
          </p>
        </div>
        <div class="people-grid" id="peopleGrid" aria-label="人物照片合集"></div>
      </div>
    </section>

    <section class="section memory-band" id="moments">
      <div class="section-title section-inner">
        <h2>流动画卷</h2>
        <p>像翻过一条长长的毕业走廊，照片从眼前轻轻经过。停下鼠标，就能把某一刻看得更久一点。</p>
      </div>
      <div class="marquee-wrap" aria-label="毕业照片滚动展示">
        <div class="marquee" id="marqueeA"></div>
        <div class="marquee reverse" id="marqueeB"></div>
      </div>
    </section>

    <section class="section gallery" id="gallery">
      <div class="section-inner">
        <div class="section-title">
          <h2>瀑布流相册</h2>
          <p id="galleryNote">全部照片</p>
        </div>
        <div class="photo-grid" id="photoGrid" aria-live="polite"></div>
        <div class="load-row">
          <button class="load-more" id="loadMore" type="button">加载更多照片</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    哈哈哈哈哈哈哈哈哈哈哈哈哈
  </footer>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="照片预览">
    <button class="close" id="closeLightbox" type="button" aria-label="关闭预览">&times;</button>
    <img id="lightboxImage" alt="放大的毕业照片">
  </div>

    const root = document.documentElement;
    const photoCount = document.querySelector("#photoCount");
    const marqueeA = document.querySelector("#marqueeA");
    const marqueeB = document.querySelector("#marqueeB");
    const peopleGrid = document.querySelector("#peopleGrid");
    const photoGrid = document.querySelector("#photoGrid");
    const loadMore = document.querySelector("#loadMore");
    const galleryNote = document.querySelector("#galleryNote");
    const lightbox = document.querySelector("#lightbox");
    const lightboxImage = document.querySelector("#lightboxImage");
    const closeLightbox = document.querySelector("#closeLightbox");

    let rendered = 0;
    const batchSize = 32;
    const coverImage = "images/cover.jpg";
    let activeImages = images;
    let activeAlbum = "全部";

    root.style.setProperty("--hero-img", `url("${coverImage}")`);
    if (photoCount) photoCount.textContent = images.length;

    function makeStripPhoto(src, index) {
      const frame = document.createElement("div");
      frame.className = "strip-photo";

      const img = document.createElement("img");
      img.src = src;
      img.loading = "lazy";
      img.decoding = "async";
      img.alt = `毕业照片 ${index + 1}`;

      frame.appendChild(img);
      return frame;
    }

    function renderMarquee(target, selected) {
      const loop = selected.concat(selected);
      const fragment = document.createDocumentFragment();
      loop.forEach((src, index) => fragment.appendChild(makeStripPhoto(src, index)));
      target.appendChild(fragment);
    }

    function imageNumber(src) {
      const match = src.match(/DSC(\d+)\.JPG$/);
      return match ? Number(match[1]) : 0;
    }

    function inRanges(src, ranges) {
      const number = imageNumber(src);
      return ranges.some(([start, end]) => number >= start && number <= end);
    }

    const personAlbums = [
      {
        name: "中发白",
        cover: coverImage,
        getPhotos: () => images
      },
      {
        name: "红中",
        cover: coverImage,
        getPhotos: () => images.filter((src) => inRanges(src, [[8760, 8773], [8880, 8907], [9040, 9068], [9130, 9167]]))
      },
      {
        name: "东风",
        cover: "images/DSC08782.JPG",
        getPhotos: () => images.filter((src) => inRanges(src, [[8781, 8835], [8987, 9038], [9168, 9204]]))
      },
      {
        name: "南风",
        cover: "images/DSC08847.JPG",
        getPhotos: () => images.filter((src) => inRanges(src, [[8845, 8905], [9070, 9123], [9216, 9238]]))
      },
      {
        name: "西风",
        cover: "images/DSC09071.JPG",
        getPhotos: () => images.filter((src) => inRanges(src, [[8774, 8780], [8908, 8986], [9124, 9167]]))
      },
      {
        name: "北风",
        cover: "images/DSC09245.JPG",
        getPhotos: () => images.filter((src) => inRanges(src, [[9239, 9306]]))
      }
    ];

    function renderPeopleGrid() {
      const fragment = document.createDocumentFragment();

      personAlbums.forEach((album) => {
        const photos = album.getPhotos();
        const card = document.createElement("button");
        card.className = `person-card${album.name === activeAlbum ? " active" : ""}`;
        card.type = "button";
        card.setAttribute("aria-label", `查看${album.name}照片`);

        const img = document.createElement("img");
        img.src = album.cover;
        img.loading = "eager";
        img.decoding = "async";
        img.alt = `${album.name}照片合集`;

        const label = document.createElement("span");
        label.innerHTML = `${album.name}<small>${photos.length}</small>`;

        card.appendChild(img);
        card.appendChild(label);
        card.addEventListener("click", () => selectAlbum(album.name));
        fragment.appendChild(card);
      });

      peopleGrid.replaceChildren(fragment);
    }

    function selectAlbum(name) {
      const album = personAlbums.find((item) => item.name === name) || personAlbums[0];
      activeAlbum = album.name;
      activeImages = album.getPhotos();
      rendered = 0;
      photoGrid.replaceChildren();
      galleryNote.textContent = album.name === "中发白" ? "全部照片" : `${album.name} · ${activeImages.length} 张`;
      loadMore.disabled = false;
      renderPeopleGrid();
      renderGalleryBatch();
      document.querySelector("#gallery").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderGalleryBatch() {
      const next = activeImages.slice(rendered, rendered + batchSize);
      const fragment = document.createDocumentFragment();

      next.forEach((src, index) => {
        const absoluteIndex = rendered + index;
        const item = document.createElement("button");
        item.className = "photo";
        item.type = "button";
        item.dataset.title = `青春瞬间 ${absoluteIndex + 1}`;
        item.setAttribute("aria-label", `查看毕业照片 ${absoluteIndex + 1}`);

        const img = document.createElement("img");
        img.src = src;
        img.loading = "lazy";
        img.decoding = "async";
        img.alt = `毕业照片 ${absoluteIndex + 1}`;

        item.appendChild(img);
        item.addEventListener("click", () => openLightbox(src, img.alt));
        fragment.appendChild(item);
      });

      photoGrid.appendChild(fragment);
      rendered += next.length;

      if (rendered >= activeImages.length) {
        loadMore.textContent = "所有照片已展示";
        loadMore.disabled = true;
      } else {
        loadMore.textContent = `加载更多照片（${rendered}/${activeImages.length}）`;
      }
    }

    function openLightbox(src, alt) {
      lightboxImage.src = src;
      lightboxImage.alt = alt;
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closePreview() {
      lightbox.classList.remove("open");
      lightboxImage.removeAttribute("src");
      document.body.style.overflow = "";
    }

    const stripA = images.filter((_, index) => index % 12 === 0).slice(0, 26);
    const stripB = images.filter((_, index) => index % 12 === 6).slice(0, 26);

    renderMarquee(marqueeA, stripA);
    renderMarquee(marqueeB, stripB);
    renderPeopleGrid();
    renderGalleryBatch();
    loadMore.addEventListener("click", renderGalleryBatch);
    closeLightbox.addEventListener("click", closePreview);
    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) closePreview();
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && lightbox.classList.contains("open")) closePreview();
    });
  </script>
</body>
</html>
